name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/checkout@v4
      - id: create
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: context.ref.replace('refs/tags/', ''),
              name: `Dante ${context.ref.replace('refs/tags/', '')}`,
              draft: true,
              prerelease: false,
              body: [
                'See [CHANGELOG.md](https://github.com/' + context.repo.owner + '/' + context.repo.repo + '/blob/main/CHANGELOG.md) for what changed.',
                '',
                '## Downloads',
                '',
                '- **Windows**: `Dante_*_x64-setup.exe` (NSIS) or `Dante_*_x64_en-US.msi`',
                '- **macOS Apple Silicon**: `Dante_*_aarch64.dmg`',
                '- **macOS Intel**: `Dante_*_x64.dmg`',
                '- **Linux**: `Dante_*_amd64.AppImage`, `*.deb`, or `*.rpm`',
                '- **CLI** (`dante-run`): standalone binary attached separately',
              ].join('\n'),
            });
            return data.id;

  build:
    needs: create-release
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macOS-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm dependencies
        run: npm install

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target ${{ matrix.target }}

      - name: Build dante-run CLI
        run: cargo build --release --bin dante-run --target ${{ matrix.target }} --manifest-path src-tauri/Cargo.toml

      - name: Upload dante-run binary (Unix)
        if: matrix.platform != 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: src-tauri/target/${{ matrix.target }}/release/dante-run

      - name: Upload dante-run binary (Windows)
        if: matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: src-tauri/target/${{ matrix.target }}/release/dante-run.exe
